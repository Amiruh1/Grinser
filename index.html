<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestión de Inventario | Fotocopiadoras y Tóners | Ricoh, Canon, Konica Minolta</title>
    <!-- Librerías para exportar: SheetJS (XLSX) y jsPDF (PDF) + autoTable -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 20px 24px;
            margin-bottom: 28px;
            transition: 0.2s;
        }
        .card-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 18px;
            color: #1e293b;
            border-left: 5px solid #3b82f6;
            padding-left: 16px;
        }
        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: flex-end;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 140px;
        }
        .field-group label {
            font-weight: 600;
            color: #334155;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select, input, button {
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        button {
            background: #3b82f6;
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        button:hover {
            background: #2563eb;
            transform: scale(0.98);
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-success {
            background: #10b981;
        }
        .btn-success:hover {
            background: #059669;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            background: #f1f5f9;
            padding: 14px 10px;
            text-align: left;
            font-weight: 600;
            color: #0f172a;
        }
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }
        .badge {
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .stock-counter {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .stock-counter button {
            width: 32px;
            height: 32px;
            padding: 0;
            font-size: 1.2rem;
            border-radius: 40px;
            background: #e2e8f0;
            color: #0f172a;
        }
        .stock-counter button:active {
            transform: scale(0.92);
        }
        .stock-value {
            font-weight: 700;
            min-width: 45px;
            text-align: center;
            font-size: 1.1rem;
        }
        .empty-row {
            text-align: center;
            color: #64748b;
            padding: 30px;
        }
        .action-icons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            box-shadow: none;
            color: #3b82f6;
        }
        .icon-btn:hover {
            background: #f1f5f9;
        }
        .delete-btn {
            color: #dc2626;
        }
        .export-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .stand-select-small {
            padding: 5px 8px;
            font-size: 0.8rem;
            border-radius: 30px;
            background-color: #f8fafc;
        }
        .marca-img-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
        }
        .marca-img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 12px;
            background: #ffffff;
            padding: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .marca-img:hover {
            transform: scale(1.05);
        }
        .contador-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 150px;
        }
        .contador-group label {
            font-weight: 600;
            color: #334155;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .contador-group input {
            background-color: #fef9e3;
            border-color: #fbbf24;
        }
        @media (max-width: 750px) {
            .form-grid { flex-direction: column; }
            .card { padding: 16px; }
            .marca-img { width: 40px; height: 40px; padding: 4px; }
            .marca-img-cell { min-width: 50px; }
        }
        .info-note {
            margin-top: 12px;
            font-size: 0.8rem;
            background: #fef9e3;
            padding: 8px 12px;
            border-radius: 16px;
            color: #92400e;
        }
        .contador-badge {
            background: #e0e7ff;
            color: #3730a3;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }
        .info-na {
            color: #94a3b8;
            font-style: italic;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-title">📦 Gestión de Inventario</div>
        <div class="form-grid">
            <div class="field-group">
                <label>Tipo producto</label>
                <select id="productType">
                    <option value="fotocopiadora">🖨️ Fotocopiadora</option>
                    <option value="toner">🧴 Tóner / Cartucho</option>
                </select>
            </div>
            <div class="field-group">
                <label>Marca *</label>
                <select id="marcaSelect" style="font-weight: 500;">
                    <option value="Ricoh">RICOH</option>
                    <option value="Canon">CANON</option>
                    <option value="Konica Minolta">KONICA MINOLTA</option>
                </select>
            </div>
            <div class="field-group">
                <label>Modelo</label>
                <input type="text" id="modelo" placeholder="Ej: MP 4055, iR-ADV C555, Bizhub 367" autocomplete="off">
            </div>
            <div class="field-group">
                <label>Stand</label>
                <select id="standSelect">
                    <option value="104">Stand 104</option>
                    <option value="105">Stand 105</option>
                    <option value="106">Stand 106</option>
                    <option value="108">Stand 108</option>
                    <option value="109">Stand 109</option>
                    <option value="121">Stand 121</option>
                    <option value="134">Stand 134</option>
                    <option value="135">Stand 135</option>
                </select>
            </div>
            <div id="contadorFieldGroup" class="contador-group" style="display: none;">
                <label>📟 Contador (copias/páginas)</label>
                <input type="number" id="contadorInicial" value="0" min="0" step="100" placeholder="Ej: 12500">
            </div>
            <div id="tonerFields" style="display: none;">
                <div class="field-group">
                    <label>📦 Cantidad de cajas</label>
                    <input type="number" id="cajas" value="1" min="1" step="1">
                </div>
                <div class="field-group">
                    <label>🔢 Unidades por caja</label>
                    <input type="number" id="unidadesPorCaja" value="10" min="1" step="1">
                </div>
            </div>
            <div class="field-group">
                <label>&nbsp;</label>
                <button id="agregarBtn">➕ Agregar / Acumular stock</button>
            </div>
        </div>
        <div class="info-note">
            🔁 <strong>Cambiar stand:</strong> usa el desplegable junto a cada producto. 🗑️ <strong>Eliminar</strong> para borrar el producto.<br>
        </div>
    </div>

    <div class="export-buttons">
        <button id="exportExcelBtn" class="btn-success">📎 Exportar a Excel</button>
        <button id="exportPdfBtn" class="btn-success">📄 Exportar a PDF</button>
    </div>

    <div class="card">
        <div class="card-title">📋 Inventario actual</div>
        <div class="table-wrapper">
            <table id="inventoryTable">
                <thead id="tableHeader">
                    <tr id="headerRow">
                        <th>Tipo</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Stand</th>
                        <th>Stock Total (uds)</th>
                        <th id="contadorHeader" style="display: none;">Contador (copias)</th>
                        <th>Contador / Ajuste</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row"><td colspan="7">No hay productos registrados. Agrega fotocopiadoras o tóner.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let productos = [];
    let nextId = 1;
    const STANDS_VALIDOS = ["104", "105", "106", "108", "109", "121", "134", "135"];
    
    const MARCA_IMAGENES = {
        "Ricoh": "https://1000marcas.net/wp-content/uploads/2020/03/Ricoh-logo.jpg",
        "Canon": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSV8VCg7OUsGJKa9f_vaDyeBsQ8WTfuTKKCuQ&s",
        "Konica Minolta": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRb2AEC17FI7SlBiMWUehWVZRyumT7pif1TJA&s"
    };
    
    function getMarcaImageHTML(marca) {
        const imgUrl = MARCA_IMAGENES[marca];
        if (!imgUrl) return `<div class="marca-img-cell" style="min-width:60px;"></div>`;
        return `<div class="marca-img-cell">
                    <img class="marca-img" src="${imgUrl}" alt="${marca}" 
                         style="width:48px; height:48px; object-fit:contain; background:white; border-radius:12px; padding:6px; box-shadow:0 2px 6px rgba(0,0,0,0.08);"
                         onerror="this.onerror=null; this.style.display='none';">
                </div>`;
    }

    const productTypeSelect = document.getElementById('productType');
    const tonerFieldsDiv = document.getElementById('tonerFields');
    const contadorFieldGroup = document.getElementById('contadorFieldGroup');
    const contadorInicialInput = document.getElementById('contadorInicial');
    const marcaSelect = document.getElementById('marcaSelect');
    const modeloInput = document.getElementById('modelo');
    const standSelect = document.getElementById('standSelect');
    const cajasInput = document.getElementById('cajas');
    const unidadesPorCajaInput = document.getElementById('unidadesPorCaja');
    const agregarBtn = document.getElementById('agregarBtn');
    const tableBody = document.getElementById('tableBody');
    const exportExcelBtn = document.getElementById('exportExcelBtn');
    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const contadorHeader = document.getElementById('contadorHeader');

    function toggleFieldsByType() {
        const tipo = productTypeSelect.value;
        if (tipo === 'fotocopiadora') {
            tonerFieldsDiv.style.display = 'none';
            contadorFieldGroup.style.display = 'flex';
        } else {
            tonerFieldsDiv.style.display = 'flex';
            contadorFieldGroup.style.display = 'none';
            contadorInicialInput.value = "0";
        }
    }
    productTypeSelect.addEventListener('change', toggleFieldsByType);
    toggleFieldsByType();

    function findExistingProduct(tipo, marca, modelo, stand) {
        return productos.find(p => p.tipo === tipo && p.marca === marca && p.modelo === modelo && p.stand === stand);
    }

    function agregarProducto() {
        const tipo = productTypeSelect.value;
        const marca = marcaSelect.value;
        let modelo = modeloInput.value.trim();
        if (modelo === "") { alert("Por favor ingresa el modelo."); return; }
        const stand = standSelect.value;
        
        let nuevoStock = 0;
        let nuevoContador = null;
        
        if (tipo === 'fotocopiadora') {
            let cantidad = prompt("Cantidad de fotocopiadoras a agregar:", "1");
            if (cantidad === null) return;
            let parsed = parseInt(cantidad);
            if (isNaN(parsed) || parsed <= 0) { 
                if(parsed !== 0) { alert("Cantidad inválida."); return; } 
                else { nuevoStock = 0; }
            } else {
                nuevoStock = parsed;
            }
            let contadorVal = parseInt(contadorInicialInput.value);
            if (isNaN(contadorVal)) contadorVal = 0;
            nuevoContador = contadorVal >= 0 ? contadorVal : 0;
        } else {
            let cajas = parseInt(cajasInput.value) || 1;
            let udsCaja = parseInt(unidadesPorCajaInput.value) || 1;
            nuevoStock = cajas * udsCaja;
            if (nuevoStock <= 0) { alert("Debe haber al menos una unidad."); return; }
        }
        
        if (tipo === 'fotocopiadora' && nuevoStock === 0) {
            alert("No se agregó stock.");
            return;
        }
        
        const existente = findExistingProduct(tipo, marca, modelo, stand);
        if (existente) {
            existente.stockTotal += nuevoStock;
            if (tipo === 'fotocopiadora' && nuevoContador !== null && nuevoContador > (existente.contador || 0)) {
                existente.contador = nuevoContador;
                alert(`✅ Sumado ${nuevoStock} uds. Contador actualizado a ${existente.contador}. Nuevo total: ${existente.stockTotal}`);
            } else if (tipo === 'fotocopiadora') {
                alert(`✅ Sumado ${nuevoStock} uds. Contador se mantiene en ${existente.contador || 0}. Nuevo total: ${existente.stockTotal}`);
            } else {
                alert(`✅ Sumado ${nuevoStock} uds. Nuevo total: ${existente.stockTotal}`);
            }
        } else {
            const nuevoProducto = { id: nextId++, tipo, marca, modelo, stand, stockTotal: nuevoStock };
            if (tipo === 'fotocopiadora') {
                nuevoProducto.contador = nuevoContador !== null ? nuevoContador : 0;
            }
            productos.push(nuevoProducto);
            alert(tipo === 'fotocopiadora' ? `✅ Nueva fotocopiadora con stock ${nuevoStock} uds. Contador: ${nuevoProducto.contador}` : `✅ Nuevo tóner con ${nuevoStock} uds.`);
        }
        renderizarTabla();
        modeloInput.value = "";
        if (tipo === 'fotocopiadora') {
            contadorInicialInput.value = "0";
        } else {
            cajasInput.value = "1";
            unidadesPorCajaInput.value = "10";
        }
    }

    function cambiarStandConListbox(idProducto, selectElement) {
        const nuevoStand = selectElement.value;
        if (!STANDS_VALIDOS.includes(nuevoStand)) { alert("Stand no válido."); return; }
        const producto = productos.find(p => p.id === idProducto);
        if (!producto || producto.stand === nuevoStand) return;
        const colision = findExistingProduct(producto.tipo, producto.marca, producto.modelo, nuevoStand);
        if (colision) {
            if (confirm(`⚠️ Ya existe en Stand ${nuevoStand} con stock ${colision.stockTotal}. ¿Fusionar?`)) {
                colision.stockTotal += producto.stockTotal;
                if (producto.tipo === 'fotocopiadora' && (producto.contador || 0) > (colision.contador || 0)) {
                    colision.contador = producto.contador;
                }
                productos = productos.filter(p => p.id !== producto.id);
                alert(`✅ Fusionado. Nuevo total: ${colision.stockTotal}`);
                renderizarTabla();
            } else { 
                selectElement.value = producto.stand; 
            }
        } else {
            producto.stand = nuevoStand;
            renderizarTabla();
        }
    }

    function eliminarProducto(idProducto) {
        const producto = productos.find(p => p.id === idProducto);
        if (producto && confirm(`¿Eliminar "${producto.marca} ${producto.modelo}"?`)) {
            productos = productos.filter(p => p.id !== idProducto);
            renderizarTabla();
        }
    }

    function ajustarStock(idProducto, delta) {
        const producto = productos.find(p => p.id === idProducto);
        if (!producto) return;
        let nuevo = producto.stockTotal + delta;
        if (nuevo < 0) {
            if (confirm(`Stock ${producto.stockTotal}. ¿Eliminar por agotado?`)) eliminarProducto(idProducto);
            return;
        }
        producto.stockTotal = nuevo;
        if (producto.tipo === 'fotocopiadora' && delta < 0 && confirm(`¿Deseas actualizar el contador de ${producto.modelo}? Actual: ${producto.contador || 0}`)) {
            let nuevoContador = prompt("Nuevo valor del contador (páginas):", producto.contador || 0);
            if (nuevoContador !== null) {
                let parsed = parseInt(nuevoContador);
                if (!isNaN(parsed) && parsed >= 0) producto.contador = parsed;
            }
        } else if (producto.tipo === 'fotocopiadora' && delta > 0 && confirm(`¿Quieres actualizar el contador de la fotocopiadora al agregar unidades?`)) {
            let nuevoContador = prompt("Contador actual (páginas):", producto.contador || 0);
            if (nuevoContador !== null) {
                let parsed = parseInt(nuevoContador);
                if (!isNaN(parsed) && parsed >= 0) producto.contador = parsed;
            }
        }
        if (producto.stockTotal === 0) setTimeout(() => {
            if (confirm(`"${producto.marca} ${producto.modelo}" agotado. ¿Eliminar?`)) eliminarProducto(producto.id);
        }, 50);
        renderizarTabla();
    }
    
    function editarContador(idProducto) {
        const producto = productos.find(p => p.id === idProducto);
        if (!producto || producto.tipo !== 'fotocopiadora') return;
        let nuevoValor = prompt(`Ingrese el nuevo contador para ${producto.marca} ${producto.modelo}:`, producto.contador || 0);
        if (nuevoValor !== null) {
            let parsed = parseInt(nuevoValor);
            if (!isNaN(parsed) && parsed >= 0) {
                producto.contador = parsed;
                renderizarTabla();
            } else alert("Valor inválido.");
        }
    }

    function renderizarTabla() {
        const hayFotocopiadora = productos.some(p => p.tipo === 'fotocopiadora');
        
        // Mostrar u ocultar la columna completa del contador
        if (contadorHeader) {
            contadorHeader.style.display = hayFotocopiadora ? 'table-cell' : 'none';
        }
        
        // Ajustar colspan del mensaje vacío
        if (productos.length === 0) {
            const colspanCount = hayFotocopiadora ? 8 : 7;
            tableBody.innerHTML = `<tr class="empty-row"><td colspan="${colspanCount}">No hay productos registrados. Agrega fotocopiadoras o tóner.</td></tr>`;
            return;
        }
        
        let html = '';
        for (const prod of productos) {
            const standOptions = STANDS_VALIDOS.map(s => `<option value="${s}" ${prod.stand === s ? 'selected' : ''}>Stand ${s}</option>`).join('');
            
            let contadorCell = '';
            if (hayFotocopiadora) {
                if (prod.tipo === 'fotocopiadora') {
                    const contadorVal = prod.contador !== undefined ? prod.contador : 0;
                    contadorCell = `<td><div style="display:flex; gap:6px; align-items:center;"><span class="contador-badge">📟 ${contadorVal.toLocaleString()}</span><button class="icon-btn edit-contador-btn" data-id="${prod.id}" title="Editar contador">✏️</button></div></td>`;
                } else {
                    contadorCell = `<td><span class="info-na">—</span></td>`;
                }
            }
            
            html += `<tr>
                        <td>${prod.tipo === 'fotocopiadora' ? '🖨️ Fotocopiadora' : '🧴 Tóner'}</td>
                        <td>${getMarcaImageHTML(prod.marca)}</td>
                        <td><strong>${escapeHtml(prod.modelo)}</strong></td>
                        <td><span class="badge" style="background:#dbeafe;">Stand ${prod.stand}</span></td>
                        <td>${prod.stockTotal} uds</td>
                        ${contadorCell}
                        <td><div class="stock-counter">
                            <button class="decrement-btn" data-id="${prod.id}" data-delta="-1">−</button>
                            <span class="stock-value">${prod.stockTotal}</span>
                            <button class="increment-btn" data-id="${prod.id}" data-delta="1">+</button>
                            <button class="decrement5-btn" data-id="${prod.id}" data-delta="-5">-5</button>
                        </div></td>
                        <td><div style="display:flex; gap:5px; flex-wrap:wrap;">
                            <select class="stand-select-small" data-id="${prod.id}">${standOptions}</select>
                            <button class="icon-btn apply-stand-btn" data-id="${prod.id}">✅</button>
                            <button class="icon-btn delete-btn" data-id="${prod.id}">🗑️</button>
                        </div></td>
                    </tr>`;
        }
        
        tableBody.innerHTML = html;
        
        document.querySelectorAll('.decrement-btn, .increment-btn, .decrement5-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                ajustarStock(parseInt(btn.dataset.id), parseInt(btn.dataset.delta));
            });
        });
        document.querySelectorAll('.apply-stand-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const select = btn.closest('tr').querySelector('.stand-select-small');
                if (select) cambiarStandConListbox(id, select);
            });
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => eliminarProducto(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.edit-contador-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                editarContador(parseInt(btn.dataset.id));
            });
        });
    }

    function escapeHtml(str) { 
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); 
    }

    function exportToExcel() {
        if (productos.length === 0) { alert("No hay datos para exportar."); return; }
        const wb = XLSX.utils.book_new();
        const hayFoto = productos.some(p => p.tipo === 'fotocopiadora');
        let headers = ["Tipo", "Marca", "Modelo", "Stand", "Stock (Unidades)", "Estado"];
        if (hayFoto) headers.splice(5, 0, "Contador (copias/páginas)");
        
        const rows = productos.map(p => {
            let baseRow = [
                p.tipo === 'fotocopiadora' ? 'Fotocopiadora' : 'Tóner',
                p.marca,
                p.modelo,
                `Stand ${p.stand}`,
                p.stockTotal,
                p.stockTotal === 0 ? 'AGOTADO' : 'Disponible'
            ];
            if (hayFoto) {
                let contadorVal = p.tipo === 'fotocopiadora' ? (p.contador || 0).toLocaleString() : '---';
                baseRow.splice(5, 0, contadorVal);
            }
            return baseRow;
        });
        
        const sheetData = [headers, ...rows];
        const ws = XLSX.utils.aoa_to_sheet(sheetData);
        const colWidths = hayFoto ? [{ wch: 18 }, { wch: 22 }, { wch: 40 }, { wch: 12 }, { wch: 18 }, { wch: 22 }, { wch: 14 }] : [{ wch: 18 }, { wch: 22 }, { wch: 40 }, { wch: 12 }, { wch: 18 }, { wch: 14 }];
        ws['!cols'] = colWidths;
        
        const finalSheetData = [
            [`INVENTARIO DE FOTOCOPIADORAS Y TÓNER`],
            [`Fecha: ${new Date().toLocaleString()}`],
            [`Total de productos: ${productos.length}`],
            [], 
            ...sheetData
        ];
        const finalWs = XLSX.utils.aoa_to_sheet(finalSheetData);
        finalWs['!cols'] = colWidths;
        if (!finalWs['!merges']) finalWs['!merges'] = [];
        const lastColIndex = hayFoto ? 6 : 5;
        finalWs['!merges'].push({ s: { r: 0, c: 0 }, e: { r: 0, c: lastColIndex } });
        XLSX.utils.book_append_sheet(wb, finalWs, "Inventario");
        XLSX.writeFile(wb, `inventario_${new Date().toISOString().slice(0,19)}.xlsx`);
    }

    async function exportToPDF() {
        if (productos.length === 0) { alert("No hay registros."); return; }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        const hayFoto = productos.some(p => p.tipo === 'fotocopiadora');
        let tableColumn = ["Tipo", "Marca", "Modelo", "Stand", "Stock", "Estado"];
        if (hayFoto) tableColumn.splice(5, 0, "Contador");
        
        const tableRows = productos.map(p => {
            let row = [
                p.tipo === 'fotocopiadora' ? 'Fotocopiadora' : 'Tóner',
                p.marca,
                p.modelo,
                `Stand ${p.stand}`,
                p.stockTotal.toString(),
                p.stockTotal === 0 ? 'AGOTADO' : 'En stock'
            ];
            if (hayFoto) {
                let contVal = p.tipo === 'fotocopiadora' ? (p.contador || 0).toLocaleString() : 'N/A';
                row.splice(5, 0, contVal);
            }
            return row;
        });
        
        doc.setFontSize(16);
        doc.text("Reporte de Inventario", 14, 20);
        doc.setFontSize(10);
        doc.text(`Generado: ${new Date().toLocaleString()}`, 14, 30);
        doc.autoTable({
            head: [tableColumn], body: tableRows, startY: 45, theme: 'striped',
            headStyles: { fillColor: [41, 112, 165], textColor: 255, fontSize: 9, fontStyle: 'bold' },
            bodyStyles: { fontSize: 8 }, 
            columnStyles: hayFoto ? { 0: { cellWidth: 28 }, 1: { cellWidth: 30 }, 2: { cellWidth: 42 }, 3: { cellWidth: 22 }, 4: { cellWidth: 18 }, 5: { cellWidth: 28 }, 6: { cellWidth: 20 } } : { 0: { cellWidth: 30 }, 1: { cellWidth: 32 }, 2: { cellWidth: 45 }, 3: { cellWidth: 25 }, 4: { cellWidth: 20 }, 5: { cellWidth: 22 } },
            alternateRowStyles: { fillColor: [240, 248, 255] }, margin: { left: 8, right: 8 }
        });
        doc.save(`inventario_${new Date().toISOString().slice(0,19)}.pdf`);
    }

    agregarBtn.addEventListener('click', agregarProducto);
    exportExcelBtn.addEventListener('click', exportToExcel);
    exportPdfBtn.addEventListener('click', exportToPDF);
    renderizarTabla();
</script>
</body>
</html>
